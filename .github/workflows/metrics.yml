name: Generar Estadisticas
on:
  schedule:
    - cron: "0 3 * * *" # Se ejecuta a las 3 AM todos los días
  workflow_dispatch: # Botón para ejecutarlo a mano cuando quieras

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: brunogiraudo03
          template: classic
          base: header, activity, repositories
          config_timezone: America/Argentina/Cordoba
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 5
